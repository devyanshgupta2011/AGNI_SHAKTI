<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agni-Drishti | Autonomous Firefighting</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        body { background-color: #0b0b0b; color: white; font-family: 'Inter', sans-serif; }
        .orange-glow { text-shadow: 0 0 15px rgba(255, 102, 0, 0.7); }
        .btn-orange { background: #ff6600; transition: all 0.3s ease; }
        .btn-orange:hover { background: #ff8533; transform: translateY(-3px); box-shadow: 0 10px 20px rgba(255, 102, 0, 0.4); }
        .card { background: #1a1a1a; border: 1px solid #333; transition: border 0.3s ease; }
        .card:hover { border-color: #ff6600; }
    </script>
</head>
<body>

    <section class="h-screen flex flex-col justify-center items-center text-center p-5">
        <h1 class="text-6xl md:text-8xl font-black uppercase tracking-tighter orange-glow" data-aos="zoom-in">
            AGNI <span class="text-[#ff6600]">DRISHTI</span>
        </h1>
        <p class="mt-4 text-gray-400 text-xl max-w-2xl" data-aos="fade-up" data-aos-delay="200">
            Advanced Autonomous UAV for Real-time Fire Detection and Suppression. 
            Engineered for the IIT KGP Young Innovator's Program.
        </p>
        <div class="mt-8" data-aos="fade-up" data-aos-delay="400">
            <a href="#roadmap" class="btn-orange px-8 py-3 rounded-full font-bold text-black uppercase tracking-widest">Explore Mission</a>
        </div>
    </section>

    <section id="roadmap" class="py-20 px-10">
        <h2 class="text-4xl font-bold mb-12 border-l-4 border-[#ff6600] pl-4">Project Evolution</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            
            <div class="card p-8 rounded-2xl" data-aos="fade-right">
                <span class="text-[#ff6600] font-mono">v1.0</span>
                <h3 class="text-2xl font-bold mt-2">Core Flight</h3>
                <p class="text-gray-400 mt-4">ESP32 Custom FC + ESP-NOW Protocol. Hand-coded stabilizer and receiver logic.</p>
            </div>

            <div class="card p-8 rounded-2xl" data-aos="fade-up">
                <span class="text-[#ff6600] font-mono">v3.0</span>
                <h3 class="text-2xl font-bold mt-2">Autonomous Navigation</h3>
                <p class="text-gray-400 mt-4">NodeMCU GPS Spoofing. High-precision coordinate tracking and target injection.</p>
            </div>

            <div class="card p-8 rounded-2xl" data-aos="fade-left">
                <span class="text-[#ff6600] font-mono">v6.0</span>
                <h3 class="text-2xl font-bold mt-2">Agni Suppression</h3>
                <p class="text-gray-400 mt-4">Thermal hotspot scanning & automated payload delivery for active fire extinguishing.</p>
            </div>

        </div>
    </section>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: false });
    </script>
</body>
</html>
